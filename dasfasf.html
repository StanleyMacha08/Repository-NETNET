		<script>
			$('#dg').datagrid({ toolbar: '#tb' });
			 
			$("#form").on("change","#type", function(event){
				if($(this).val() == "transmital"){
					$("#doctype").val("pdf");
				}
			});
		
			$("#form").on("change","#doctype", function(event){
				if($("#type").val() == "transmital" && $(this).val() == "xlsx"){ 
					popMessage("Export to Spreadsheet is not available for the selected form.",true,true);
					$("#doctype").val("pdf");
				}
			}); 

			$("#form").on("click",".fbtn-assign", function(event){
				oldurl = $("#form").attr('action');
				url = $(this).data("url")
				
				$("#form").attr('target','_self'); 
				$("#form").attr('action',url); 
							
				submitform('cancel'); 
			});  

			$("#form").on("click",".fbtn-editcheck", function(event){
				oldurl = $("#form").attr('action');
				url = $(this).data("url")
				url = url+'?action=editcheck'
				
				$("#form").attr('target','_self'); 
				$("#form").attr('action',url);  
				
				let myForm = document.getElementById('form');
				var fdata = new FormData(myForm);
 
				fdata.append('action', 'editcheck');

				submitJS('form', 'editcheck', url, fdata);   
				
				$("#form").attr('action',oldurl);   
			}); 


			$("#form").on("click",".fbtn-filter", function(event){ 
				var df  = $("#dtfrom").val().split("/") 
				var dt  = $("#dtto").val().split("/") 
				df = df[2]+'-'+df[0]+'-'+df[1]
				dt = dt[2]+'-'+dt[0]+'-'+dt[1]
 
				url =  $(this).data("url") + "?action=loadgrid&fr=" + df + "&to="+ dt +"&filter=" + $("#filter").val(); 
							
				$('#dg').datagrid('load', url); 
			});

			$("#form").on("click",".fbtn-print", function(event){
				oldurl = $("#form").attr('action');
				url = $(this).data("url")
				
				var doctype = $("#doctype").val();

				if( $("#type").val() == "transmital" && doctype == "xlsx"){
					popMessage("Export to Spreadsheet is not available for the selected form.",true,true);
					return false;
				}
				
				if( $("#type").val() != "transmital" ){
					var dg = $('#dg')
					var checked = dg.datagrid('getChecked');
					var row = dg.datagrid('getRows');

					var cprint = []
					$.each(row, function(index, value) { 
						if ($.inArray(value, checked) >= 0) { 
							cprint.push(value.check_key); 
						} 
					});

					$("#forprint").val(JSON.stringify(cprint));
				} 

				if(doctype == "xlsx"){ 
					url = '<?php echo site_url() ?>../Print/C_GenerateSPSheet'; 
					action = "print-list&type=check_"+$("#type").val();
				} else{
					action = 'check_'+$("#type").val();
				}
				
				$("#form").attr('action',url); 
			
				$("#form").attr('target','_blank'); 
				submitform(action); 
				
				$("#form").attr('target','_self'); 
				$("#form").attr('action',oldurl);  
				
			});
			
			$("#form").on("click",".fbtn-search", function(event){
				oldurl = $("#form").attr('action');
				url = $(this).data("url")
				
				$("#form").attr('target','_self'); 
				$("#form").attr('action',url); 
							
				submitform('search'); 
				
				$("#form").attr('target','_self'); 
				$("#form").attr('action',oldurl);  
			});

			function activate(action, response){ 
				if(action != "editcheck"){ return false; }  

				if(response.success == false){  
					popMessage(response.message, true, true);  
					$('.form-popup').fadeOut('slow'); 
					return true;
				}

				if(action == "editcheck"){  
					popMessage(response.message, true, false);
					$("#dg").datagrid('load') 
					$('.form-popup').fadeOut('slow'); 
					return true;
				}
			}
			
		</script>
